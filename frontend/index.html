<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Core Engine Meta Rules -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <!-- Robots and Indexing Controls -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://www.analyticscircle.com" />

    <!-- Application Brand Icons -->
    <link rel="shortcut icon" href="./Logo.jpeg" type="image/x-icon" />
    <link rel="apple-touch-icon" href="./Logo.jpeg" />

    <!-- Primary Search Engine Optimization (SEO) Metadata -->
    <title>Analytics Circle | Data Science, AI, Generative AI & Power BI Training</title>
    <meta name="description" content="Join India's top institute for Data Science, AI, Generative AI, Agentic AI, Excel, Power BI. Expert mentorship, real projects, guaranteed placements." />
    <meta name="keywords" content="Data Science course, AI training, Generative AI, Agentic AI, Machine Learning, Excel analytics, Power BI, Data Analysis, Business Analytics, Python for Data Science, Analytics Circle" />
    <meta name="author" content="Analytics Circle Team" />

    <!-- Open Graph Framework (Social Media Previews - LinkedIn, Facebook, WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Analytics Circle" />
    <meta property="og:url" content="https://www.analyticscircle.com" />
    <meta property="og:title" content="Analytics Circle – Data Science & AI Training" />
    <meta property="og:description" content="Master Data Science, AI, GenAI, Power BI, Excel. 12,000+ careers transformed." />
    <meta property="og:image" content="https://www.analyticscircle.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card Meta Data (Optimized for X / Twitter sharing) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://www.analyticscircle.com" />
    <meta name="twitter:title" content="Analytics Circle – Data Science & AI Training" />
    <meta name="twitter:description" content="Master Data Science, AI, GenAI, Power BI, Excel. 12,000+ careers transformed." />
    <meta name="twitter:image" content="https://www.analyticscircle.com/og-image.jpg" />

    <!-- Structured Data Engine (JSON-LD Local Business Schema for Search Crawlers) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "Analytics Circle",
        "description": "Data Science, AI, GenAI, and Power BI training institute.",
        "url": "https://www.analyticscircle.com",
        "logo": "https://www.analyticscircle.com/Logo.jpeg",
        "telephone": "+91-9999190695",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "D-100, 2nd Floor, Laxmi Nagar",
          "addressLocality": "New Delhi",
          "addressRegion": "Delhi",
          "addressCountry": "IN",
          "postalCode": "110092"
        },
        "sameAs": [
          "https://www.facebook.com/analyticscircle",
          "https://www.linkedin.com/company/analyticscircle"
        ]
      }
    </script>

    <!-- Font Optimization System Connections -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&display=swap" />

    <!-- Remix Icon Vector Graphic System Library -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" />

    <!-- Global Base CSS Layer Overrides -->
    <style>
      body {
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
    </style>
  </head>
  <body>
    <!-- Main Application DOM Mounting Pipeline -->
    <div id="root"></div>

    <!-- Core React Framework Entry Module -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
